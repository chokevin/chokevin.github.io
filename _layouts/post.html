---
layout: default
---
<article class="post-article">
  <a class="back-link" href="{{ '/' | relative_url }}">← Back to all posts</a>
  <p class="eyebrow">{{ page.categories | first | default: "Notes" }}</p>
  <h1>{{ page.title }}</h1>
  <p class="meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
  </p>
  <div class="post-content">
    {{ content }}
  </div>
</article>
