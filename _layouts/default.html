<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --link: #0f766e;
      --maxw: 760px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --border: #1f2937;
        --link: #5eead4;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.65;
    }
    .container {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 1rem;
    }
    header {
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .site-title {
      margin: 0;
      font-size: 1.35rem;
    }
    .site-title a {
      text-decoration: none;
      color: var(--fg);
    }
    nav {
      margin: 0.4rem 0 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    nav a { color: var(--link); text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    h1, h2, h3 { line-height: 1.25; }
    a { color: var(--link); }
    .post-list {
      list-style: none;
      padding: 0;
      margin: 1rem 0 0;
    }
    .post-list li {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list time {
      display: block;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .meta {
      color: var(--muted);
      font-size: 0.95rem;
    }
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <p>© {{ site.time | date: '%Y' }} {{ site.title }} · Published with GitHub Pages and Jekyll.</p>
    </div>
  </footer>
</body>
</html>
