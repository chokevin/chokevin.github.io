<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <meta name="theme-color" content="#090d14">
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="wordmark" href="{{ '/' | relative_url }}">
          <span class="wordmark-dot" aria-hidden="true"></span>
          <span>{{ site.title }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
        </nav>
      </div>
    </header>

    <main class="container site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© {{ site.time | date: '%Y' }} {{ site.title }} · Published with GitHub Pages and Jekyll.</p>
      </div>
    </footer>
  </div>
</body>
</html>
