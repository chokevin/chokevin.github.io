<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Field notes cover</title>
  <desc id="desc">Blue gradient cover image for engineering field notes article.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dce8fb"/>
      <stop offset="100%" stop-color="#b9cff4"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b6db2"/>
      <stop offset="100%" stop-color="#6fa0de"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="200" r="260" fill="#9abce9" opacity="0.45"/>
  <rect x="0" y="650" width="1600" height="250" fill="url(#band)" opacity="0.9"/>
  <text x="110" y="760" fill="#ffffff" font-size="82" font-family="Inter, Arial, sans-serif" font-weight="700">Engineering Field Notes</text>
</svg>
