<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Design for failure cover</title>
  <desc id="desc">Dark blue gradient cover image for reliability architecture article.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d7e4f8"/>
      <stop offset="100%" stop-color="#aec6ec"/>
    </linearGradient>
    <linearGradient id="shape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f578f"/>
      <stop offset="100%" stop-color="#4f7bb8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="920" y="120" width="620" height="620" rx="50" fill="url(#shape)" opacity="0.82"/>
  <rect x="110" y="670" width="760" height="18" fill="#2f578f" opacity="0.45"/>
  <rect x="110" y="712" width="560" height="18" fill="#2f578f" opacity="0.32"/>
  <text x="110" y="600" fill="#17345f" font-size="74" font-family="Inter, Arial, sans-serif" font-weight="700">Design for Failure</text>
</svg>
